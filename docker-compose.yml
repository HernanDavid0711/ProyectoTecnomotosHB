version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taller_motos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tecnomotoshb
      POSTGRES_USER: hernan
      POSTGRES_PASSWORD: tecnomotos0408
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hernan -d tecnomotoshb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: